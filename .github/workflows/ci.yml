name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # No uv.lock in this repo yet; cache against pyproject.toml instead.
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: uv run ruff check charter/ tests/ scripts/

      - name: Ruff (format check)
        run: uv run ruff format --check charter/ tests/ scripts/

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

      # Conformance vectors (Issue #42). Runs the language-neutral Python
      # reference runner over every JSON test vector under
      # `conformance/vectors/`. Failures here MUST take CI red — any
      # divergence is either a regression in the Python implementation or
      # a deliberate breaking change that needs a SPEC.md version bump.
      - name: Conformance runner (Python reference)
        run: uv run python conformance/runners/python/run.py --vectors-dir conformance/vectors

      # Adversarial suite (Issue #29). Failures here surface as warnings
      # rather than blocking the main pipeline — we want regressions in
      # known-defended attack vectors to be loud without taking the build
      # down. See docs/threat-model.md for the catalogue of vectors and
      # known-broken cases (which run as xfail and therefore do not fail
      # this step).
      - name: Pytest (adversarial — non-blocking)
        id: adversarial
        continue-on-error: true
        run: |
          uv run pytest tests/adversarial -v --tb=short

      - name: Annotate adversarial result
        if: steps.adversarial.outcome == 'failure'
        run: |
          echo "::warning::Adversarial test suite has failures. See the previous step's output and docs/threat-model.md."
