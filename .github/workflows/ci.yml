name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # No uv.lock in this repo yet; cache against pyproject.toml instead.
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: uv run ruff check charter/ tests/ scripts/

      - name: Ruff (format check)
        run: uv run ruff format --check charter/ tests/ scripts/

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

      # Adversarial suite (Issue #29). Failures here surface as warnings
      # rather than blocking the main pipeline — we want regressions in
      # known-defended attack vectors to be loud without taking the build
      # down. See docs/threat-model.md for the catalogue of vectors and
      # known-broken cases (which run as xfail and therefore do not fail
      # this step).
      - name: Pytest (adversarial — non-blocking)
        id: adversarial
        continue-on-error: true
        run: |
          uv run pytest tests/adversarial -v --tb=short

      - name: Annotate adversarial result
        if: steps.adversarial.outcome == 'failure'
        run: |
          echo "::warning::Adversarial test suite has failures. See the previous step's output and docs/threat-model.md."

  # Perf baseline (Issue #43, B3.10). Opt-in via `[bench]` in the head
  # commit message. Runs the `benchmarks/` suite and uploads the JSON
  # report as an artifact. Does NOT block the default PR flow — perf
  # regressions are reviewed manually before release (see
  # docs/performance.md §4 for the policy).
  benchmark:
    name: benchmark (opt-in via [bench])
    if: contains(github.event.head_commit.message, '[bench]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install package with dev extras
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Run benchmarks
        run: |
          uv run pytest benchmarks/ --benchmark-only \
            --benchmark-json=bench-report.json

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charter-bench-report
          path: bench-report.json
          if-no-files-found: warn
          retention-days: 30
